name: Generate Snake & Pacman

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Snake ──────────────────────────────────────────────────────────
      - name: Generate snake (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: shivk-1
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # ── Pacman ─────────────────────────────────────────────────────────
      - name: Generate pacman (light + dark)
        uses: kiranhart/github-contribution-pacman@v1
        with:
          github_user_name: shivk-1
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?palette=github-dark

      # ── Push both to the `output` branch ───────────────────────────────
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
