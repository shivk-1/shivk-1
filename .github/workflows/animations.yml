name: Generate Snake & Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake and pacman animations
        uses: Platane/snk@v3
        with:
          github_user_name: shivk-1
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/pacman-contribution-graph.svg?color_snake=yellow&color_dots=#0f172a,#1e3a5f,#1d4ed8,#3b82f6,#93c5fd
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=yellow

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
